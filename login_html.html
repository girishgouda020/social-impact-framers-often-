<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – FarmerMart</title>
  <link rel="stylesheet" href="style_css.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo-big">🌾 FarmerMart</div>
    <div class="subtitle">Sign in to your account</div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your name" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Any password works"/>
    </div>
    <button class="btn btn-primary btn-full" onclick="handleLogin()">Login →</button>

    <div class="auth-footer">
      Don't have an account? <a href="login_html.html" onclick="handleLogin()">Just enter a name & login</a>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="script_js.js"></script>
<script>
  if (getUser()) window.location.href = 'dashboard_html.html';

  function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username) { showToast('Please enter a username', 'error'); return; }
    if (!password) { showToast('Please enter a password', 'error'); return; }
    // Store temp user without role, go to role selection
    set('fm_temp_user', username);
    window.location.href = 'role_html.html';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
