<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products – FarmerMart</title>
  <link rel="stylesheet" href="style_css.css"/>
</head>
<body>
<div id="navbar" class="navbar"></div>

<div class="page-wrapper">
  <div class="page-header">
    <h1>🌿 Products</h1>
    <p>Fresh produce directly from farmers</p>
  </div>

  <!-- Add Product Form (Farmer only) -->
  <div class="add-product-form" id="add-form" style="display:none">
    <h2>➕ Add New Product</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="p-name" placeholder="e.g. Fresh Carrots"/>
      </div>
      <div class="form-group">
        <label>Price (₹)</label>
        <input type="number" id="p-price" placeholder="e.g. 50" min="1"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Unit</label>
        <input type="text" id="p-unit" placeholder="e.g. kg, dozen, bunch"/>
      </div>
      <div class="form-group">
        <label>Available For</label>
        <select id="p-type">
          <option value="both">Both (Retail & Wholesale)</option>
          <option value="retail">Retail Only</option>
          <option value="wholesale">Wholesale Only</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Emoji Icon</label>
      <input type="text" id="p-emoji" placeholder="e.g. 🥕" maxlength="2"/>
    </div>
    <button class="btn btn-primary" onclick="submitProduct()">Add Product</button>
  </div>

  <!-- Filter -->
  <div style="display:flex;gap:.8rem;margin-bottom:1.5rem;flex-wrap:wrap;">
    <button class="btn btn-outline btn-sm active-filter" onclick="filterProducts('all', this)">All</button>
    <button class="btn btn-outline btn-sm" onclick="filterProducts('retail', this)">Retail</button>
    <button class="btn btn-outline btn-sm" onclick="filterProducts('wholesale', this)">Wholesale</button>
  </div>

  <div class="card-grid" id="products-grid"></div>
</div>

<div id="toast" class="toast"></div>
<script src="script_js.js"></script>
<script>
  const user = requireAuth();
  let currentFilter = 'all';

  if (user) {
    renderNavbar('products');
    if (user.role === 'Farmer') document.getElementById('add-form').style.display = 'block';
    renderProducts();
  }

  function renderProducts() {
    const products = getProducts();
    const filtered = currentFilter === 'all' ? products : products.filter(p => p.type === currentFilter || p.type === 'both');
    const grid = document.getElementById('products-grid');
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🌿</div><h3>No products found</h3><p>Check back later or add some!</p></div>`;
      return;
    }
    grid.innerHTML = filtered.map(p => {
      const badgeClass = p.type === 'retail' ? 'badge-retail' : p.type === 'wholesale' ? 'badge-wholesale' : 'badge-both';
      const badgeLabel = p.type === 'retail' ? 'Retail' : p.type === 'wholesale' ? 'Wholesale' : 'Retail & Wholesale';
      const canBuy = user.role !== 'Farmer';
      return `
      <div class="product-card">
        <div class="product-img">${p.emoji || '🌿'}</div>
        <div class="product-body">
          <span class="type-badge ${badgeClass}">${badgeLabel}</span>
          <h3>${p.name}</h3>
          <div class="price">₹${p.price} <small style="font-size:.75rem;font-weight:400;color:var(--gray)">/ ${p.unit}</small></div>
          <div class="seller">🧑‍🌾 ${p.seller || user.username}</div>
          ${canBuy ? `<button class="btn btn-primary btn-sm btn-full" onclick="addToCart('${p.id}')">Add to Cart 🛒</button>` : '<span style="color:var(--gray);font-size:.82rem">Your listing</span>'}
        </div>
      </div>`;
    }).join('');
  }

  function filterProducts(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.active-filter').forEach(b => b.classList.remove('active-filter', 'btn-primary'));
    btn.classList.add('active-filter');
    renderProducts();
  }

  function submitProduct() {
    const name = document.getElementById('p-name').value.trim();
    const price = parseFloat(document.getElementById('p-price').value);
    const unit = document.getElementById('p-unit').value.trim() || 'kg';
    const type = document.getElementById('p-type').value;
    const emoji = document.getElementById('p-emoji').value.trim() || '🌿';
    if (!name || !price || price <= 0) { showToast('Please fill name and valid price', 'error'); return; }
    addProduct({ name, price, unit, type, emoji, seller: user.username });
    showToast('Product added! 🌿', 'success');
    ['p-name','p-price','p-unit','p-emoji'].forEach(id => document.getElementById(id).value = '');
    renderProducts();
  }
</script>
</body>
</html>
